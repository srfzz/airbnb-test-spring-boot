spring:
  application:
    name: airBnb
  datasource:
    url: jdbc:postgresql://localhost:55432/air_bnb
    password: 12345678
    username: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  servlet:
    context-path: /api/v1